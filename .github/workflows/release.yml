name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.0)"
        required: true

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: "25"
          distribution: liberica
          cache: maven

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set Maven version
        run: |
          ./mvnw --batch-mode versions:set -DnewVersion="${{ steps.version.outputs.VERSION }}"
          ./mvnw --batch-mode versions:commit

      - name: Build fat JAR
        run: ./mvnw --batch-mode verify

      - name: Rename artifacts
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          mv target/habit-hooks-${VERSION}-launcher.jar target/habit-hooks-launcher.jar

      - name: Generate SLSA provenance attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: target/habit-hooks-launcher.jar

      - name: Verify SLSA attestation
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh attestation verify target/habit-hooks-launcher.jar --repo "${{ github.repository }}"

      - name: Install Cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign release artifacts (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign-blob --yes \
            --output-signature target/habit-hooks-launcher.jar.sig \
            --output-certificate target/habit-hooks-launcher.jar.pem \
            target/habit-hooks-launcher.jar

          cosign sign-blob --yes \
            --output-signature target/habit-hooks-${{ steps.version.outputs.VERSION }}-sources.jar.sig \
            --output-certificate target/habit-hooks-${{ steps.version.outputs.VERSION }}-sources.jar.pem \
            target/habit-hooks-${{ steps.version.outputs.VERSION }}-sources.jar

          cosign sign-blob --yes \
            --output-signature target/bom.json.sig \
            --output-certificate target/bom.json.pem \
            target/bom.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: "v${{ steps.version.outputs.VERSION }}"
          name: "habit-hooks ${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          files: |
            target/habit-hooks-launcher.jar
            target/habit-hooks-${{ steps.version.outputs.VERSION }}-sources.jar
            target/bom.json
            target/habit-hooks-launcher.jar.sig
            target/habit-hooks-launcher.jar.pem
            target/habit-hooks-${{ steps.version.outputs.VERSION }}-sources.jar.sig
            target/habit-hooks-${{ steps.version.outputs.VERSION }}-sources.jar.pem
            target/bom.json.sig
            target/bom.json.pem

  native:
    name: Native (${{ matrix.asset }})
    needs: release
    runs-on: ${{ matrix.os }}

    permissions:
      contents: write
      id-token: write
      attestations: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: habit-hooks-linux-x64
          - os: ubuntu-24.04-arm
            asset: habit-hooks-linux-arm64
          - os: macos-latest
            asset: habit-hooks-darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up GraalVM JDK 25
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: "25"
          distribution: graalvm
          cache: maven

      - name: Set Maven version
        run: |
          ./mvnw --batch-mode versions:set -DnewVersion="${{ needs.release.outputs.version }}"
          ./mvnw --batch-mode versions:commit

      - name: Build native image
        run: ./mvnw --batch-mode -Pnative -DskipTests package

      - name: Rename native binary
        run: mv target/habit-hooks "target/${{ matrix.asset }}"

      - name: Smoke test native binary
        run: |
          test -x "target/${{ matrix.asset }}"
          "./target/${{ matrix.asset }}" --version
          smoke_dir="$(mktemp -d)"
          pushd "$smoke_dir"
          git init -q
          "${{ github.workspace }}/target/${{ matrix.asset }}" init
          "${{ github.workspace }}/target/${{ matrix.asset }}" doctor
          popd

      - name: Generate SLSA provenance attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: target/${{ matrix.asset }}

      - name: Verify SLSA attestation
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh attestation verify "target/${{ matrix.asset }}" --repo "${{ github.repository }}"

      - name: Install Cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign native binary (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign-blob --yes \
            --output-signature "target/${{ matrix.asset }}.sig" \
            --output-certificate "target/${{ matrix.asset }}.pem" \
            "target/${{ matrix.asset }}"

      - name: Upload native binary to release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: "v${{ needs.release.outputs.version }}"
          files: |
            target/${{ matrix.asset }}
            target/${{ matrix.asset }}.sig
            target/${{ matrix.asset }}.pem
