name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    # Nightly build — catches dependency drift
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build & Test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [ "25" ]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: ${{ matrix.java }}
          distribution: liberica
          cache: maven

      - name: Build, test, and quality gate
        run: ./mvnw --batch-mode --update-snapshots verify

      - name: Verify coached-rule badge is up to date
        if: matrix.java == '25'
        run: |
          ./scripts/coached-rules-count.sh
          git diff --exit-code docs/coached-rules-badge.json \
            || { echo "::error::docs/coached-rules-badge.json is stale. Run scripts/coached-rules-count.sh and commit the result."; exit 1; }

      - name: Upload coverage to Codecov
        if: matrix.java == '25'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: target/site/jacoco/jacoco.xml
          fail_ci_if_error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results-java-${{ matrix.java }}
          path: |
            target/surefire-reports/
            target/failsafe-reports/
          retention-days: 7

  self-check:
    name: Reference validation (habit-hooks checks itself)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: "25"
          distribution: liberica
          cache: maven

      - name: Build fat JAR
        run: ./mvnw --batch-mode package -DskipTests

      - name: Smoke Spring Boot initializer templates
        run: |
          sample="$(mktemp -d)"
          mkdir -p "$sample/src/test/java"
          (cd "$sample" && java -jar "$GITHUB_WORKSPACE"/target/habit-hooks-*-launcher.jar init --spring-boot --dry-run)

      - name: Run habit-hooks against itself
        run: java -jar target/habit-hooks-*-launcher.jar --all
