name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    # Nightly build — catches dependency drift
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build & Test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [ "25" ]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: ${{ matrix.java }}
          distribution: liberica
          cache: maven

      - name: Build, test, and quality gate
        run: ./mvnw --batch-mode --update-snapshots verify

      - name: Upload coverage to Codecov
        if: matrix.java == '25'
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5
        with:
          files: target/site/jacoco/jacoco.xml
          fail_ci_if_error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-results-java-${{ matrix.java }}
          path: |
            target/surefire-reports/
            target/failsafe-reports/
          retention-days: 7

  self-check:
    name: Reference validation (habit-hooks checks itself)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up JDK 25
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: "25"
          distribution: liberica
          cache: maven

      - name: Build fat JAR
        run: ./mvnw --batch-mode package -DskipTests

      - name: Run habit-hooks against itself
        run: java -jar target/habit-hooks-*-launcher.jar --all
