name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    # Nightly build — catches dependency drift
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build & Test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [ "25" ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Build, test, and quality gate
        run: ./mvnw --batch-mode --update-snapshots verify

      - name: Upload coverage to Codecov
        if: matrix.java == '25'
        uses: codecov/codecov-action@v5
        with:
          files: target/site/jacoco/jacoco.xml
          fail_ci_if_error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-java-${{ matrix.java }}
          path: target/surefire-reports/
          retention-days: 7

  self-check:
    name: Self-dogfood (habit-hooks checks itself)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: temurin
          cache: maven

      - name: Build fat JAR
        run: ./mvnw --batch-mode package -DskipTests

      - name: Run habit-hooks against itself
        run: java -jar target/habit-hooks-*-launcher.jar --all
