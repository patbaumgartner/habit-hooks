# .habit-hooks.yaml — generated by habit-hooks init
#
# Edit the analyzers and scope sections to fit your project. This starter keeps
# expensive project-wide analyzers disabled until the matching Maven snippets are
# copied into the build.
# Full config reference: https://github.com/patbaumgartner/habit-hooks#configuration
# Agent loop: habit-hooks doctor && habit-hooks --all && habit-hooks tasks --no-fail
# Spring Boot apps can start with the stricter full setup via:
# habit-hooks init --spring-boot

prompts: ./prompts

rules:
  # Disable or tune rules here. Example:
  # checkstyle:TodoComment:
  #   disabled: true
  # pmd:GodClass:
  #   exclude:
  #     - "**/*Test.java"
  # checkstyle:MagicNumber:
  #   severity: warning
  #
  # severity: warning keeps findings visible but exits zero. Unset severity or
  # any non-warning value blocks the run.

scope:
  onlyChangedFiles: true
  branchBase: main
  excludeTests: true

analyzers:
  checkstyle:
    enabled: true
    configFile: checkstyle.xml
  pmd:
    enabled: true
    rulesets:
      - pmd-ruleset.xml
  cpd:
    enabled: false
    goal: pmd:cpd
    reportFile: target/cpd.xml
  taikai:
    enabled: false
    testClass: ArchitectureTest
  spotbugs:
    enabled: false
    goal: -Phabit-hooks-analyzers spotbugs:spotbugs
    reportFile: target/spotbugsXml.xml
  jacoco:
    enabled: false
    goal: test jacoco:report
    reportFile: target/site/jacoco/jacoco.xml
  cyclonedx:
    enabled: false
    goal: -Phabit-hooks-analyzers cyclonedx:makeAggregateBom
    reportFile: target/bom.json
  pitest:
    enabled: false
    goal: -Pmutation-test test-compile org.pitest:pitest-maven:mutationCoverage
    reportFile: target/pit-reports/mutations.xml
  spring-javaformat:
    enabled: false
    goal: spring-javaformat:validate
    reportFile: target/habit-hooks/spring-javaformat.log
  errorprone:
    enabled: false
    goal: -Phabit-hooks-errorprone compile
    reportFile: target/habit-hooks/errorprone.log
  owasp:
    enabled: false
    goal: -Phabit-hooks-analyzers org.owasp:dependency-check-maven:check -Dformat=JSON -DfailBuildOnCVSS=11
    reportFile: target/dependency-check-report.json
  jspecify:
    enabled: false
