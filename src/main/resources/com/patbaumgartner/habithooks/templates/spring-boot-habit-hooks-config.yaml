# .habit-hooks.yaml - generated by habit-hooks init --spring-boot
#
# Spring Boot mode enables every analyzer surface that habit-hooks can turn into
# project feedback. This is a strict validation profile, not necessarily the
# fastest edit/compile loop. Copy the Maven fragments from
# habit-hooks-maven-snippets.xml into pom.xml, then run:
# habit-hooks doctor && habit-hooks --all
#
# Agent loop: habit-hooks doctor && habit-hooks --all && habit-hooks tasks --no-fail

prompts: ./prompts

rules:
  # Disable or tune rules here. Example:
  # pmd:GodClass:
  #   exclude:
  #     - "**/*Application.java"
  # checkstyle:MagicNumber:
  #   severity: warning
  #
  # severity: warning keeps findings visible but exits zero. Unset severity or
  # any non-warning value blocks the run.

scope:
  onlyChangedFiles: false
  branchBase: main
  excludeTests: true

analyzers:
  checkstyle:
    enabled: true
    configFile: checkstyle.xml
  pmd:
    enabled: true
    rulesets:
      - pmd-ruleset.xml
  cpd:
    enabled: true
    goal: pmd:cpd
    reportFile: target/cpd.xml
  taikai:
    enabled: true
    testClass: ArchitectureTest
  spotbugs:
    enabled: true
    goal: -Phabit-hooks-analyzers spotbugs:spotbugs
    reportFile: target/spotbugsXml.xml
  jacoco:
    enabled: true
    goal: test jacoco:report
    reportFile: target/site/jacoco/jacoco.xml
  cyclonedx:
    enabled: true
    goal: -Phabit-hooks-analyzers cyclonedx:makeAggregateBom
    reportFile: target/bom.json
  pitest:
    enabled: true
    # Tune large apps with -DtargetClasses and -DtargetTests, or disable PIT for
    # tight local loops and keep it in CI/reference validation.
    goal: -Pmutation-test test-compile org.pitest:pitest-maven:mutationCoverage -DfailWhenNoMutations=false
    reportFile: target/pit-reports/mutations.xml
  spring-javaformat:
    enabled: true
    goal: spring-javaformat:validate
    reportFile: target/habit-hooks/spring-javaformat.log
  errorprone:
    enabled: true
    goal: -Phabit-hooks-errorprone compile
    reportFile: target/habit-hooks/errorprone.log
  owasp:
    enabled: true
    # First runs may need an NVD cache refresh. Add -DautoUpdate=false for
    # repeatable reference runs after the local cache is warm.
    goal: -Phabit-hooks-analyzers org.owasp:dependency-check-maven:check -Dformat=JSON -DfailBuildOnCVSS=11
    reportFile: target/dependency-check-report.json
  jspecify:
    enabled: true